<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#070a12">
  <title>MVine FCM - content creator</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070a12;
      --panel: rgba(255, 255, 255, .08);
      --panel-strong: rgba(255, 255, 255, .13);
      --line: rgba(255, 255, 255, .16);
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, .68);
      --soft: rgba(248, 250, 252, .46);
      --cyan: #22d3ee;
      --rose: #fb7185;
      --amber: #fbbf24;
      --green: #34d399;
      --blue: #60a5fa;
      --violet: #a78bfa;
      --shadow: 0 22px 60px rgba(0, 0, 0, .34);
      --ease-out: cubic-bezier(.2, .9, .2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100svh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      position: relative;
      background:
        linear-gradient(118deg, rgba(34, 211, 238, .18) 0%, transparent 24%, rgba(251, 113, 133, .15) 52%, transparent 76%, rgba(251, 191, 36, .12) 100%),
        linear-gradient(150deg, #060913 0%, #111827 46%, #170e25 100%);
      background-size: 180% 180%, 100% 100%;
      animation: backgroundFlow 18s ease-in-out infinite;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .55), transparent 72%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 4%, rgba(255, 255, 255, .08) 18%, transparent 34%, rgba(34, 211, 238, .08) 55%, transparent 74%),
        repeating-linear-gradient(120deg, rgba(255, 255, 255, .035) 0 1px, transparent 1px 18px);
      opacity: .55;
      transform: translate3d(-7%, -4%, 0) rotate(-4deg);
      animation: lightSweep 14s var(--ease-out) infinite alternate;
      mix-blend-mode: screen;
    }

    @keyframes backgroundFlow {
      0%, 100% {
        background-position: 0% 50%, center;
      }

      50% {
        background-position: 100% 50%, center;
      }
    }

    @keyframes lightSweep {
      from {
        transform: translate3d(-8%, -4%, 0) rotate(-4deg);
      }

      to {
        transform: translate3d(8%, 4%, 0) rotate(-4deg);
      }
    }

    @keyframes revealUp {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes avatarFloat {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes ringSpin {
      to {
        transform: rotate(1turn);
      }
    }

    @keyframes sheen {
      from {
        transform: translateX(-140%) skewX(-18deg);
      }

      to {
        transform: translateX(170%) skewX(-18deg);
      }
    }

    @keyframes arrowNudge {
      0%, 100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(4px);
      }
    }

    @keyframes subtitlePulse {
      0%, 100% {
        opacity: .74;
        transform: translateY(0);
        letter-spacing: .02em;
      }

      50% {
        opacity: 1;
        transform: translateY(-2px);
        letter-spacing: .08em;
      }
    }

    a,
    button {
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      width: min(100%, 448px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(22px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .profile {
      padding-top: clamp(22px, 7svh, 54px);
      text-align: center;
      animation: revealUp .72s var(--ease-out) both;
    }

    .avatar {
      width: clamp(112px, 31vw, 142px);
      aspect-ratio: 1;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      background: rgba(255, 255, 255, .1);
      box-shadow: 0 20px 58px rgba(0, 0, 0, .32), 0 0 42px rgba(34, 211, 238, .18);
      animation: avatarFloat 5.8s ease-in-out infinite;
    }

    .avatar::before {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: inherit;
      background: conic-gradient(from 0deg, var(--cyan), var(--violet), var(--rose), var(--amber), var(--cyan));
      filter: blur(11px);
      opacity: .7;
      z-index: -1;
      animation: ringSpin 9s linear infinite;
    }

    .avatar::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, .48);
      box-shadow: inset 0 0 22px rgba(255, 255, 255, .12);
      pointer-events: none;
    }

    .avatar img {
      width: calc(100% - 10px);
      height: calc(100% - 10px);
      border-radius: inherit;
      object-fit: cover;
      object-position: 50% 44%;
      border: 1px solid rgba(255, 255, 255, .24);
      filter: saturate(1.12) contrast(1.05);
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 7.4vw, 34px);
      line-height: 1.1;
      letter-spacing: 0;
      font-weight: 900;
      text-wrap: balance;
      text-shadow: 0 12px 32px rgba(0, 0, 0, .35);
    }

    .subtitle {
      width: fit-content;
      margin: 10px auto 0;
      padding: 7px 13px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 999px;
      color: rgba(248, 250, 252, .86);
      background: linear-gradient(90deg, rgba(34, 211, 238, .14), rgba(251, 113, 133, .14));
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      box-shadow: 0 12px 28px rgba(0, 0, 0, .18);
      animation: subtitlePulse 2.8s ease-in-out infinite;
    }

    .main-links {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 28px;
      animation: revealUp .72s var(--ease-out) .12s both;
    }

    .quick-link,
    .utility-link,
    .modal-action,
    .close-button {
      border: 1px solid var(--line);
      color: var(--text);
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, .2);
      transition: transform .24s var(--ease-out), background .24s ease, border-color .24s ease, box-shadow .24s ease;
    }

    .quick-link {
      min-width: 0;
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      font: inherit;
      cursor: pointer;
      padding: 10px 4px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background: rgba(255, 255, 255, .095);
    }

    .quick-link::before,
    .utility-link::before,
    .modal-action::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 -45%;
      width: 42%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .2), transparent);
      opacity: 0;
      transform: translateX(-140%) skewX(-18deg);
      pointer-events: none;
    }

    .quick-link::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 7px;
      background: linear-gradient(145deg, rgba(255, 255, 255, .14), transparent 45%);
      opacity: .7;
      z-index: -1;
    }

    .quick-link:active,
    .utility-link:active,
    .modal-action:active,
    .close-button:active {
      transform: scale(.97);
      background: var(--panel-strong);
    }

    .quick-link svg,
    .utility-link svg,
    .modal-action svg,
    .close-button svg {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
    }

    .quick-link span {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
      font-weight: 800;
      color: rgba(248, 250, 252, .82);
      white-space: nowrap;
    }

    .facebook svg {
      color: #60a5fa;
    }

    .tiktok svg {
      color: #f472b6;
    }

    .youtube svg {
      color: #fb7185;
    }

    .bank svg {
      color: #fbbf24;
    }

    .utilities {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 22px;
      animation: revealUp .72s var(--ease-out) .2s both;
    }

    .utility-link {
      min-height: 66px;
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, .105);
    }

    .utility-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .utility-icon {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .09);
      border: 1px solid rgba(255, 255, 255, .08);
      flex: 0 0 auto;
    }

    .utility-copy {
      min-width: 0;
    }

    .utility-title {
      display: block;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.2;
    }

    .utility-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .arrow {
      width: 18px;
      height: 18px;
      color: var(--soft);
      flex: 0 0 auto;
    }

    footer {
      margin-top: auto;
      padding-top: 32px;
      color: rgba(248, 250, 252, .52);
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      animation: revealUp .72s var(--ease-out) .28s both;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: end center;
      padding: 18px;
      background: rgba(0, 0, 0, .62);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }

    .modal.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      width: min(100%, 390px);
      max-height: calc(100svh - 36px);
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(12, 16, 28, .94);
      box-shadow: var(--shadow);
      overflow: hidden;
      transform: translateY(18px);
      transition: transform .22s var(--ease-out);
    }

    .modal.is-open .modal-card {
      transform: translateY(0);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .1);
    }

    .modal-title {
      margin: 0;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .close-button {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .modal-body {
      padding: 16px;
      max-height: calc(100svh - 112px);
      overflow: auto;
    }

    .bank-info {
      display: grid;
      gap: 9px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .bank-info strong {
      color: var(--text);
    }

    .qr-wrap {
      width: min(100%, 300px);
      margin: 0 auto;
      padding: 10px;
      border-radius: 8px;
      background: #fff;
    }

    .qr-wrap img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .modal-action {
      min-height: 46px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text);
      text-decoration: none;
      font: inherit;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      z-index: 20;
      left: 50%;
      top: max(16px, env(safe-area-inset-top));
      width: min(calc(100% - 36px), 360px);
      transform: translate(-50%, -18px);
      opacity: 0;
      pointer-events: none;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(12, 16, 28, .94);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      transition: opacity .2s ease, transform .2s ease;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (hover: hover) {
      .quick-link:hover,
      .utility-link:hover,
      .modal-action:hover,
      .close-button:hover {
        transform: translateY(-3px);
        border-color: rgba(255, 255, 255, .28);
        background: var(--panel-strong);
        box-shadow: 0 18px 42px rgba(0, 0, 0, .26);
      }

      .quick-link:hover::before,
      .utility-link:hover::before,
      .modal-action:hover::before {
        opacity: 1;
        animation: sheen .9s var(--ease-out);
      }

      .utility-link:hover .arrow {
        animation: arrowNudge .55s var(--ease-out);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }

    @media (max-width: 360px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .main-links {
        gap: 8px;
      }

      .quick-link span {
        font-size: 10px;
      }

      .utility-title {
        font-size: 14px;
      }
    }
  </style>
</head>

          <div>Ngân hàng: <strong>Techcombank</strong></div>
          <div>Chủ tài khoản: <strong>MAC VAN VINH</strong></div>
          <div>Số tài khoản: <strong>1907 1793 7680 15</strong></div>
        </div>

        <div class="qr-wrap">
          <img
            src="https://img.vietqr.io/image/970407-19071793768015-compact2.png?accountName=MAC%20VAN%20VINH"
            alt="QR chuyển khoản Techcombank cho MAC VAN VINH"
            width="300"
            height="386"
          >
        </div>

        <div class="modal-actions">
          <button class="modal-action" type="button" data-copy-account>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><rect x="4" y="4" width="11" height="11" rx="2"/></svg>
            Copy STK
          </button>
          <a class="modal-action" href="https://img.vietqr.io/image/970407-19071793768015-compact2.png?accountName=MAC%20VAN%20VINH" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>

  <div class="toast" id="toast" role="status" aria-live="polite">Đã sao chép số tài khoản!</div>

  <script>
    const bankModal = document.querySelector("#bankModal");
    const toast = document.querySelector("#toast");
    const accountNumber = "19071793768015";
    let toastTimer;

    function openBankModal() {
      bankModal.classList.add("is-open");
      document.body.style.overflow = "hidden";
    }

    function closeBankModal() {
      bankModal.classList.remove("is-open");
      document.body.style.overflow = "";
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("is-visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("is-visible"), 2200);
    }

    async function copyText(text, message) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const input = document.createElement("input");
          input.value = text;
          input.style.position = "fixed";
          input.style.opacity = "0";
          document.body.appendChild(input);
          input.focus();
          input.select();
          document.execCommand("copy");
          input.remove();
        }
        showToast(message);
      } catch (error) {
        showToast("Không thể sao chép, vui lòng thử lại.");
      }
    }

    document.querySelector("[data-open-bank]").addEventListener("click", openBankModal);
    document.querySelector("[data-close-bank]").addEventListener("click", closeBankModal);
    document.querySelector("[data-copy-account]").addEventListener("click", () => {
      copyText(accountNumber, "Đã sao chép số tài khoản!");
    });

    bankModal.addEventListener("click", (event) => {
      if (event.target === bankModal) closeBankModal();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && bankModal.classList.contains("is-open")) {
        closeBankModal();
      }
    });
  </script>
